version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: coderank-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: coderank
      POSTGRES_PASSWORD: coderank
      POSTGRES_DB: coderank_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U coderank']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: coderank-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
